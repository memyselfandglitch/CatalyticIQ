name: catalyticiq
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=1.24.*
  - pandas=2.0.3
  - scipy=1.10.*
  - scikit-learn=1.3.*
  - matplotlib=3.7.*
  - seaborn=0.13.*
  - tqdm
  - networkx
  - pyyaml
  - requests
  - jupyterlab
  - rdkit=2024.03.*
  - pytorch=2.2.*
  - torchvision=0.17.*
  - torchaudio=2.2.*
  - cpuonly
  - pip:
      - deepchem==2.8.0
      - selfies==2.1.1
      - optuna==4.2.1
      - gpytorch==1.13
      - fcd==1.2.2
      - xlsxwriter==3.2.0
      - cairosvg==2.7.1
